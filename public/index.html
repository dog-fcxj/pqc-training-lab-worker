<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PQC Training Lab | 后量子实验室</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <!-- 史诗背景层 -->
    <div class="bg-layers">
      <div class="bg-grid"></div>
      <div class="bg-nebula"></div>
      <div id="data-streams"></div>
    </div>

    <!-- 侧边导航 (感应式) -->
    <nav class="view-nav">
      <div class="nav-dot is-active" data-index="0" data-label="Protocol"></div>
      <div class="nav-dot" data-index="1" data-label="Principles"></div>
      <div class="nav-dot" data-index="2" data-label="Algorithms"></div>
      <div class="nav-dot" data-index="3" data-label="Deployment"></div>
    </nav>

    <!-- 详情浮层 -->
    <div id="detail-overlay" class="detail-overlay">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 60px;">
        <h2 style="margin:0; font-size:32px;">Benchmark Results</h2>
        <button class="cta-button" onclick="closeDetail()">Return</button>
      </div>
      <div id="detail-content"></div>
    </div>

    <div class="app-shell" id="app-shell">
      <!-- Section 0: Hero -->
      <section class="content-section is-active" id="section-0">
        <div style="display: flex; gap: 80px; align-items: center; max-width: 1400px; width:100%">
          <div style="flex: 1">
            <p style="color: var(--accent-magenta); font-family: 'JetBrains Mono'; font-size: 11px; letter-spacing: 4px; margin-bottom: 12px;">SYSTEM_STATUS: SECURE</p>
            <h1>后量子密码学<br/><span style="color: var(--accent-cyan)">安全实验室</span></h1>
            <p style="color: var(--text-muted); font-size: 18px; line-height: 1.8; margin-bottom: 40px; max-width: 520px;">
              量子计算正在重塑信息安全的边界。我们通过格密码、哈希树与纠错码，构建不可逾越的抗量子堡垒。
            </p>
            <div style="display: flex; gap: 16px;">
              <button class="cta-button" onclick="goToPage(2)">Algorithms</button>
              <button class="cta-button" style="border-color: var(--accent-magenta); color: var(--accent-magenta)" onclick="goToPage(1)">Principles</button>
            </div>
          </div>
          <div style="flex: 1.2; height: 500px; position: relative;">
            <div style="position: absolute; inset: 0; border: 1px solid var(--glass-border); border-radius: 4px; background: rgba(0,0,0,0.2);">
              <svg id="hero-network" viewBox="0 0 440 360" style="width:100%; height:100%;"></svg>
              <div id="hero-noise-cloud"></div>
            </div>
          </div>
        </div>
      </section>

      <!-- Section 1: Principles -->
      <section class="content-section" id="section-1">
        <div style="display: grid; grid-template-columns: 1fr 1.6fr; gap: 32px; width: 100%; max-width: 1400px;">
          <div class="card card-corners">
            <h2 style="font-size:24px;">核心数学原理</h2>
            <div id="principle-nav" style="display: grid; gap: 12px; margin-top: 32px;"></div>
          </div>
          <div class="card card-corners" style="display: grid; grid-template-rows: 1fr auto;">
            <div id="principle-stage" style="border: 1px solid var(--glass-border); background: rgba(0,0,0,0.2); position: relative; overflow: hidden;"></div>
            <div style="padding-top: 24px; display: flex; justify-content: space-between; align-items: flex-end;">
              <div id="principle-info"></div>
            </div>
          </div>
        </div>
      </section>

      <!-- Section 2: Algorithms -->
      <section class="content-section" id="section-2">
        <div style="display: grid; grid-template-rows: auto 1fr; gap: 32px; width: 100%; max-width: 1400px;">
          <div style="display: flex; justify-content: space-between; align-items: flex-end;">
            <h2 style="font-size: 40px; margin:0;">NIST 标准矩阵</h2>
            <span class="detail-jump" onclick="openDetail('algorithm')">Show All Metrics →</span>
          </div>
          <div id="algorithm-grid" style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px;"></div>
        </div>
      </section>

      <!-- Section 3: Deployment -->
      <section class="content-section" id="section-3">
        <div style="display: grid; grid-template-columns: 1.2fr 1fr; gap: 32px; width: 100%; max-width: 1400px;">
          <div class="card card-corners">
            <h2 style="margin-bottom: 30px;">工程化握手开销</h2>
            <div id="scenario-list" style="display: grid; gap: 16px;"></div>
          </div>
          <div class="card card-corners" style="background: rgba(255, 41, 117, 0.02); border-color: rgba(255, 41, 117, 0.1);">
            <div id="scenario-brief"></div>
          </div>
        </div>
      </section>
    </div>

    <!-- 模块化脚本导入 -->
    <script type="module" src="./app.js"></script>
  </body>
</html>
