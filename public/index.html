<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PQC Training Lab</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="shell">
      <header class="hero">
        <div class="hero-copy">
          <p class="eyebrow">PQC Training Lab</p>
          <h1>PQC 协议与<br />工程实验台</h1>
          <p class="lede">
            聚焦 TLS、IKEv2、对象尺寸、三类原理模型与部署量化口径的交互式资料页。
          </p>
        </div>
        <div class="hero-panel">
          <div class="hero-visual">
            <div class="hero-lattice-grid" id="hero-lattice-grid" aria-hidden="true"></div>
            <div class="hero-core-marker" aria-hidden="true"></div>
            <div class="hero-noise-cloud" id="hero-noise-cloud" aria-hidden="true"></div>
            <div class="hero-wave wave-a" aria-hidden="true"></div>
            <div class="hero-wave wave-b" aria-hidden="true"></div>
            <div class="hero-chip chip-cyan">ML-KEM</div>
            <div class="hero-chip chip-green">SLH-DSA</div>
            <div class="hero-chip chip-violet">HQC</div>
          </div>
          <div class="hero-stats" id="hero-rings"></div>
        </div>
      </header>

      <nav class="tabs" aria-label="PQC labs">
        <button class="tab is-active" data-tab="handshake">Handshake Lab</button>
        <button class="tab" data-tab="algorithm">Algorithm Lab</button>
        <button class="tab" data-tab="principle">Principle Intro</button>
      </nav>

      <main class="panels">
        <section class="panel is-active" id="panel-handshake">
          <div class="panel-grid">
            <article class="card">
              <h2>场景选择</h2>
              <div class="scenario-list" id="scenario-list"></div>
            </article>
            <article class="card">
              <h2>定量对比与口径</h2>
              <div id="scenario-detail"></div>
            </article>
          </div>
        </section>

        <section class="panel" id="panel-algorithm">
          <div class="panel-grid two-wide">
            <article class="card">
              <h2>算法比较</h2>
              <div id="algorithm-grid" class="algorithm-grid"></div>
            </article>
            <article class="card">
              <h2>原理、对象与运算路径</h2>
              <div id="algorithm-detail"></div>
            </article>
          </div>
        </section>

        <section class="panel" id="panel-principle">
          <div class="panel-grid">
            <article class="card">
              <h2>三类原理动图</h2>
              <div id="principle-visual"></div>
            </article>
            <article class="card">
              <h2>结构与运算说明</h2>
              <div id="principle-detail"></div>
            </article>
          </div>
        </section>
      </main>

      <footer class="footer">
        <p>数据与事实基于 NIST、IETF、Cloudflare 截至 2026-04-07 的公开资料。</p>
      </footer>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
