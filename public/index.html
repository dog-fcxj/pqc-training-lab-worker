<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PQC Training Lab | 模块化重构版</title>
    <meta
      name="description"
      content="面向网络、安全与架构团队的 PQC 交互实验室，聚焦算法角色、协议开销与迁移决策。"
    />
    <link rel="icon" href="data:," />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <!-- 动态网格背景 -->
    <div class="bg-grid-overlay"></div>
    <div id="data-streams" style="position: fixed; inset: 0; z-index: 0; pointer-events: none;"></div>

    <!-- 极简侧边导航 -->
    <nav class="view-nav">
      <div class="nav-dot is-active" data-index="0" data-label="Hero"></div>
      <div class="nav-dot" data-index="1" data-label="Principles"></div>
      <div class="nav-dot" data-index="2" data-label="Algorithms"></div>
      <div class="nav-dot" data-index="3" data-label="Deployment"></div>
    </nav>

    <!-- 详情浮层 (物理隔离，默认不可见) -->
    <div id="detail-overlay" class="detail-overlay" style="visibility: hidden; pointer-events: none;">
      <div style="max-width: 1200px; margin: 0 auto; position: relative;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 60px;">
          <h2 id="overlay-title" style="margin:0; font-size: 42px; background: linear-gradient(to right, #fff, var(--accent-cyan)); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Technical Spec</h2>
          <button class="cta-button" onclick="window.closeDetail()">Return</button>
        </div>
        <div id="detail-content" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px;">
          <!-- 内容动态注入 -->
        </div>
      </div>
    </div>

    <!-- 主翻页轴 -->
    <div class="app-shell" id="app-shell">
      <section class="content-section" id="section-0"></section>
      <section class="content-section" id="section-1"></section>
      <section class="content-section" id="section-2"></section>
      <section class="content-section" id="section-3"></section>
    </div>

    <footer class="site-footer">
      数据基线截至 2026-04-07，内容整理基于 NIST、IETF、Cloudflare 与 pqc-sharing-kit 公开资料。
    </footer>

    <script type="module" src="./app.js"></script>
  </body>
</html>
