<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PQC Training Lab | 后量子实验室</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <!-- 史诗级背景层 -->
    <div class="bg-layers">
      <div class="bg-grid"></div>
      <div class="bg-nebula"></div>
      <div class="bg-scanlines"></div>
    </div>

    <!-- 侧边翻页导航 -->
    <nav class="view-nav">
      <div class="nav-dot is-active" data-index="0" data-label="Introduction"></div>
      <div class="nav-dot" data-index="1" data-label="Principles"></div>
      <div class="nav-dot" data-index="2" data-label="Algorithms"></div>
      <div class="nav-dot" data-index="3" data-label="Handshake"></div>
    </nav>

    <!-- 详情浮层 -->
    <div id="detail-overlay" class="detail-overlay">
      <button class="cta-button" onclick="closeDetail()" style="margin-bottom: 40px;">Close Details</button>
      <div id="detail-content"></div>
    </div>

    <div class="app-shell" id="app-shell">
      <!-- Section 1: Hero -->
      <section class="content-section is-active" id="section-0">
        <div class="hero">
          <div class="hero-copy">
            <p style="color: var(--accent-cyan); letter-spacing: 4px; font-weight: 700;">LAB-PROTOCOL-PQC</p>
            <h1 style="font-size: 80px; margin: 20px 0; line-height: 1.1;">后量子密码学<br/><span style="color: var(--accent-violet)">安全实验室</span></h1>
            <p style="font-size: 18px; color: var(--text-muted); max-width: 500px; margin-bottom: 40px;">
              面向量子威胁的下一代防御矩阵。我们在这里重构未来的安全基座。
            </p>
            <button class="cta-button" onclick="goToPage(2)">进入算法矩阵</button>
          </div>
          <div class="hero-visual-container">
            <svg class="hero-network" id="hero-network" viewBox="0 0 440 360"></svg>
            <div id="hero-noise-cloud"></div>
          </div>
        </div>
      </section>

      <!-- Section 2: Principles -->
      <section class="content-section" id="section-1">
        <div class="panel-grid">
          <div class="card">
            <h2 style="color: var(--accent-cyan)">三类原理模型</h2>
            <p style="color: var(--text-muted)">后量子密码学的核心数学假设。点击下方切换查看实时动效。</p>
            <div id="principle-nav" style="display: grid; gap: 12px; margin-top: 40px;"></div>
          </div>
          <div class="card">
            <div id="principle-visual-container" style="height: 400px; position: relative; border: 1px solid var(--glass-border); border-radius: 20px; overflow: hidden;"></div>
            <div id="principle-summary" style="margin-top: 30px;"></div>
            <div class="detail-jump" onclick="openDetail('principle')">深入研究底层数学方程 →</div>
          </div>
        </div>
      </section>

      <!-- Section 3: Algorithms -->
      <section class="content-section" id="section-2">
        <div class="panel-grid two-wide">
          <div class="card">
            <h2 style="color: var(--accent-violet)">NIST 标准矩阵</h2>
            <div id="algorithm-list" style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 30px;"></div>
          </div>
          <div class="card">
            <div id="algorithm-brief"></div>
            <div class="detail-jump" onclick="openDetail('algorithm')">查看完整性能对比与对象规格 →</div>
          </div>
        </div>
      </section>

      <!-- Section 4: Handshake -->
      <section class="content-section" id="section-3">
        <div class="panel-grid">
          <div class="card">
            <h2 style="color: var(--accent-green)">工程化握手开销</h2>
            <div id="scenario-list" style="display: grid; gap: 12px; margin-top: 30px;"></div>
          </div>
          <div class="card">
            <div id="scenario-brief"></div>
            <div class="detail-jump" onclick="openDetail('handshake')">查看 Wireshark 级别的包结构分析 →</div>
          </div>
        </div>
      </section>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
